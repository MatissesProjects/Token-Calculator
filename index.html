<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Run Estimator | Token Cost Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --primary-light: rgba(99, 102, 241, 0.15);
            --success: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.4), 0 8px 10px -6px rgb(0 0 0 / 0.4);
        }
        
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #a5b4fc, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.04em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Input Panel */
        .token-panel {
            background: var(--card);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s;
            background: #0f172a;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        /* Monthly Runs Specialized Group */
        .monthly-group {
            grid-column: span 1;
            background: rgba(15, 23, 42, 0.5);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px dashed var(--border);
        }

        .runs-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        /* Buttons & Utilities */
        .utility-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .btn-group { display: flex; gap: 0.75rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 1.4rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a;
        }
        .btn-primary:hover { 
            background: #a5b4fc;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(129, 140, 248, 0.3);
        }

        .btn-outline {
            background: #1e293b;
            color: var(--text-main);
            border-color: var(--border);
        }
        .btn-outline:hover {
            background: #334155;
            border-color: var(--text-muted);
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        /* Panels */
        .content-panel {
            background: var(--card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 2.5rem;
            overflow: hidden;
            display: none;
        }
        .content-panel.active { display: block; }

        .chart-container {
            padding: 2rem;
            height: 500px;
            width: 100%;
        }

        .selection-panel {
            padding: 2rem;
            background: var(--card);
        }

        /* Results Grid */
        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .badge-count {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .model-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .model-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .model-info h3 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .provider-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .pin-btn {
            background: #0f172a;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pin-btn:hover, .pin-btn.pinned {
            background: var(--primary-light);
            color: var(--primary);
            border-color: var(--primary);
        }

        .card-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-footer {
            margin-top: auto;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-main {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
        }

        .too-big-warning {
            background: rgba(225, 29, 72, 0.15);
            color: #fb7185;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(225, 29, 72, 0.3);
        }

        /* Chips */
        .provider-group h4 {
            margin: 1.5rem 0 0.75rem 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chip-container { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        
        .chip {
            padding: 0.4rem 0.9rem;
            border-radius: 99px;
            background: #0f172a;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .chip.selected {
            background: var(--primary);
            color: #0f172a;
            border-color: var(--primary);
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--primary-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Compact Subscription Cards */
        .sub-card {
            padding: 1rem !important;
            border-radius: var(--radius-md) !important;
        }
        .sub-card .card-top { margin-bottom: 0.5rem !important; }
        .sub-card .card-metrics { margin-bottom: 0.5rem !important; }
        .sub-card .card-footer { 
            padding: 0.75rem 1rem !important; 
            margin: 0.75rem -1rem -1rem -1rem !important;
            border-radius: 0 0 var(--radius-md) var(--radius-md) !important;
        }
        .sub-card .model-info h3 { font-size: 1rem !important; }
        .sub-card .price-value { font-size: 1.25rem !important; }
        .sub-card .provider-label { font-size: 0.65rem !important; }
        .sub-card .metric-label { font-size: 0.6rem !important; }
        .sub-card .metric-value { font-size: 0.8rem !important; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .fade-in { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1) forwards; }

    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header>
            <h1>AI Run Estimator</h1>
            <p class="subtitle">Compare token costs and latency across 100+ LLM configurations</p>
        </header>

        <section class="token-panel">
            <div class="input-group">
                <label for="inputTokens">Fresh Input</label>
                <input type="number" id="inputTokens" value="100000" min="0">
            </div>
            <div class="input-group">
                <label for="cachedTokens">Cache Read (Hits)</label>
                <input type="number" id="cachedTokens" value="0" min="0">
            </div>
            <div class="input-group">
                <label for="cacheWriteTokens">Cache Write (Create)</label>
                <input type="number" id="cacheWriteTokens" value="0" min="0">
            </div>
            <div class="input-group">
                <label for="outputTokens">Output Tokens</label>
                <input type="number" id="outputTokens" value="5000" min="0">
            </div>
            <div class="input-group monthly-group">
                <label for="monthlyRuns">Monthly Runs</label>
                <input type="number" id="monthlyRuns" value="500" min="1">
                <div class="runs-actions">
                    <button class="chip" onclick="setRuns(1)">1x</button>
                    <button class="chip" onclick="setRuns(30)">30x</button>
                    <button class="chip" onclick="setRuns(100)">100x</button>
                </div>
            </div>
            <div class="input-group">
                <label for="instanceMultiplier">Parallel Instances</label>
                <input type="number" id="instanceMultiplier" value="1" min="1">
            </div>
        </section>

        <div class="utility-bar">
            <div class="btn-group">
                <button class="btn btn-outline" onclick="togglePanel('selectionPanel')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Filter Models
                </button>
                <button class="btn btn-outline" onclick="togglePanel('importPanel')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    Paste Stats
                </button>
                <button class="btn btn-primary" onclick="togglePanel('chartPanel')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                    Toggle Analysis Chart
                </button>
            </div>
            <div class="btn-group" style="flex: 1; justify-content: flex-end;">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search models or providers...">
                </div>
                <select id="sortSelect" style="max-width: 180px;">
                    <option value="price">Cheapest First</option>
                    <option value="newest">Latest Models</option>
                </select>
                <button class="btn btn-outline" onclick="exportToCSV()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </div>

        <div id="selectionPanel" class="content-panel">
            <div class="selection-panel" id="selectionInner"></div>
        </div>

        <div id="importPanel" class="content-panel">
            <div style="padding: 2rem;">
                <h3 style="margin-top: 0;">Import Session Stats</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem;">Paste your Gemini CLI or API summary here to auto-fill the calculator.</p>
                <textarea id="statsImport" style="width: 100%; height: 150px; background: #0f172a; color: var(--text-main); border: 2px solid var(--border); border-radius: var(--radius-md); padding: 1rem; font-family: monospace;" placeholder="Paste stats here (e.g. Usage: 1500 prompt tokens, 500 completion tokens, 10000 cached tokens)"></textarea>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="importStats()">Import & Calculate</button>
                    <button class="btn btn-outline" onclick="togglePanel('importPanel')">Cancel</button>
                </div>
            </div>
        </div>

        <div id="chartPanel" class="content-panel">
            <div class="chart-container">
                <canvas id="costChart"></canvas>
            </div>
        </div>

        <div id="pinnedSection" style="display: none;">
            <div class="section-header">
                <h2>Pinned Comparisons</h2>
                <span class="badge-count" id="pinnedCount">0</span>
            </div>
            <div class="results-grid" id="pinnedContainer"></div>
        </div>

        <div id="subsSection" style="display: none;">
            <div class="section-header">
                <h2>Fixed-Price Subscriptions</h2>
            </div>
            <div class="results-grid" id="subsContainer"></div>
        </div>

        <div class="section-header">
            <h2>Pay-as-you-go Models</h2>
            <span class="badge-count" id="totalCount">0</span>
        </div>
        <div class="results-grid" id="resultsContainer"></div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/estimate";
        const SUBS_URL = "http://localhost:8000/subscriptions";
        let currentEstimations = []; 
        let subscriptions = [];
        let selectedModelNames = new Set(); 
        let selectedModalities = new Set(['text']); // Default to text
        let pinnedModelIds = new Set();
        let pinnedSubIds = new Set();
        let isFirstLoad = true;
        let costChart = null;

        const formatMoney = (amount) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 4 }).format(amount);
        };

        function importStats() {
            const text = document.getElementById('statsImport').value;
            
            // Regex patterns for different formats
            const patterns = {
                input: [
                    /(\d+)\s+prompt tokens/i,
                    /(\d+)\s+input tokens/i,
                    /Input:\s*(\d+)/i,
                    /Prompt:\s*(\d+)/i
                ],
                output: [
                    /(\d+)\s+completion tokens/i,
                    /(\d+)\s+output tokens/i,
                    /Output:\s*(\d+)/i,
                    /Completion:\s*(\d+)/i
                ],
                cached: [
                    /(\d+)\s+cached tokens/i,
                    /Cached:\s*(\d+)/i,
                    /Cache read:\s*(\d+)/i
                ]
            };

            const findMatch = (patternList) => {
                for (const regex of patternList) {
                    const match = text.match(regex);
                    if (match) return parseInt(match[1]);
                }
                return null;
            };

            const input = findMatch(patterns.input);
            const output = findMatch(patterns.output);
            const cached = findMatch(patterns.cached);

            if (input !== null) document.getElementById('inputTokens').value = input;
            if (output !== null) document.getElementById('outputTokens').value = output;
            if (cached !== null) document.getElementById('cachedTokens').value = cached;

            if (input !== null || output !== null || cached !== null) {
                togglePanel('importPanel');
                fetchEstimates();
            } else {
                alert("Could not find any token counts in the pasted text. Try a format like '1500 prompt tokens, 500 completion tokens'.");
            }
        }

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isActive = panel.classList.contains('active');
            
            // Close other panels
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            
            if (!isActive) {
                panel.classList.add('active');
                if (id === 'chartPanel') renderChart();
            }
        }

        function setRuns(val) {
            document.getElementById('monthlyRuns').value = val;
            renderAll();
        }

        function togglePin(id, type = 'model') {
            const set = type === 'model' ? pinnedModelIds : pinnedSubIds;
            if (set.has(id)) set.delete(id);
            else set.add(id);
            renderAll();
        }

        async function fetchInitial() {
            showLoading(true);
            try {
                const subRes = await fetch(SUBS_URL);
                subscriptions = await subRes.json();
                await fetchEstimates();
            } catch (e) { console.error(e); }
            finally { showLoading(false); }
        }

        async function fetchEstimates() {
            const payload = {
                input_tokens: parseInt(document.getElementById('inputTokens').value) || 0,
                cached_tokens: parseInt(document.getElementById('cachedTokens').value) || 0,
                cache_write_tokens: parseInt(document.getElementById('cacheWriteTokens').value) || 0,
                output_tokens: parseInt(document.getElementById('outputTokens').value) || 0
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                currentEstimations = data.estimations; 
                
                if (isFirstLoad) {
                    currentEstimations.forEach(m => selectedModelNames.add(m.model_name));
                    // Collect all available modalities
                    const allModalities = new Set();
                    currentEstimations.forEach(m => m.input_modalities.forEach(mod => allModalities.add(mod)));
                    selectedModalities = allModalities;
                    isFirstLoad = false;
                }
                
                buildSelectionPanel();
                renderAll();
            } catch (error) { console.error(error); }
        }

        function renderAll() {
            renderCards();
            renderSubscriptions();
            if (document.getElementById('chartPanel').classList.contains('active')) renderChart();
        }

        function buildSelectionPanel() {
            const inner = document.getElementById('selectionInner');
            
            // Modality Selection
            const allModalities = new Set();
            currentEstimations.forEach(m => m.input_modalities.forEach(mod => allModalities.add(mod)));
            
            let html = `
                <div style="margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border);">
                    <h3 style="margin: 0 0 1rem 0;">Input Modalities</h3>
                    <div class="chip-container">
            `;
            
            Array.from(allModalities).sort().forEach(mod => {
                html += `
                    <button class="chip ${selectedModalities.has(mod) ? 'selected' : ''}" onclick="toggleModality('${mod}')">
                        ${mod.charAt(0).toUpperCase() + mod.slice(1)}
                    </button>
                `;
            });
            
            html += `
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h3 style="margin: 0;">Model Visibility</h3>
                    <div class="btn-group">
                        <button class="chip" onclick="selectAllModels(true)">Select All</button>
                        <button class="chip" onclick="selectAllModels(false)">Select None</button>
                    </div>
                </div>
            `;
            
            inner.innerHTML = html;

            const grouped = {};
            currentEstimations.forEach(m => {
                if (!grouped[m.provider]) grouped[m.provider] = [];
                grouped[m.provider].push(m.model_name);
            });

            for (const provider in grouped) {
                const div = document.createElement('div');
                div.className = 'provider-group';
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; margin-bottom: 0.75rem;">
                        <h4 style="margin: 0;">${provider}</h4>
                        <div class="btn-group" style="gap: 0.3rem;">
                            <button class="chip" style="font-size: 0.65rem; padding: 0.2rem 0.5rem;" onclick="selectProviderModels('${provider}', true)">All</button>
                            <button class="chip" style="font-size: 0.65rem; padding: 0.2rem 0.5rem;" onclick="selectProviderModels('${provider}', false)">None</button>
                        </div>
                    </div>
                `;
                const chips = document.createElement('div');
                chips.className = 'chip-container';
                grouped[provider].forEach(name => {
                    const chip = document.createElement('button');
                    chip.className = `chip ${selectedModelNames.has(name) ? 'selected' : ''}`;
                    chip.innerText = name;
                    chip.onclick = () => {
                        if (selectedModelNames.has(name)) selectedModelNames.delete(name);
                        else selectedModelNames.add(name);
                        buildSelectionPanel();
                        renderAll();
                    };
                    chips.appendChild(chip);
                });
                div.appendChild(chips);
                inner.appendChild(div);
            }
        }

        function toggleModality(mod) {
            if (selectedModalities.has(mod)) selectedModalities.delete(mod);
            else selectedModalities.add(mod);
            buildSelectionPanel();
            renderAll();
        }

        function selectAllModels(selected) {
            if (selected) {
                currentEstimations.forEach(m => selectedModelNames.add(m.model_name));
            } else {
                selectedModelNames.clear();
            }
            buildSelectionPanel();
            renderAll();
        }

        function selectProviderModels(provider, selected) {
            currentEstimations.forEach(m => {
                if (m.provider === provider) {
                    if (selected) selectedModelNames.add(m.model_name);
                    else selectedModelNames.delete(m.model_name);
                }
            });
            buildSelectionPanel();
            renderAll();
        }

        function createModelCard(model) {
            const runs = parseInt(document.getElementById('monthlyRuns').value) || 1;
            const instances = parseInt(document.getElementById('instanceMultiplier').value) || 1;
            const monthlyTotal = model.total_cost * runs * instances;
            const isPinned = pinnedModelIds.has(model.model_name);

            const card = document.createElement('div');
            card.className = 'model-card fade-in';
            
            card.innerHTML = `
                ${model.is_too_big ? '<div class="too-big-warning"><svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg> Exceeds Context Limit</div>' : ''}
                <div class="card-top">
                    <div class="model-info">
                        <span class="provider-label">${model.provider}</span>
                        <h3>${model.model_name}</h3>
                        <div style="display: flex; gap: 0.3rem; margin-top: 0.4rem;">
                            ${model.input_modalities.map(m => `<span style="font-size: 0.6rem; padding: 0.1rem 0.4rem; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); text-transform: uppercase; font-weight: bold;">${m}</span>`).join('')}
                        </div>
                    </div>
                    <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${model.model_name}')">
                        <svg width="18" height="18" fill="${isPinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                    </button>
                </div>
                <div class="card-metrics">
                    <div class="metric-item">
                        <span class="metric-label">Per Run</span>
                        <span class="metric-value">${formatMoney(model.total_cost)}</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Latency</span>
                        <span class="metric-value">~${model.estimated_latency_sec}s <small style="color: var(--text-muted); font-size: 0.7rem;">(${model.speed_tps} t/s)</small></span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Max Context</span>
                        <span class="metric-value">${(model.max_context === null || model.max_context === undefined || model.max_context >= 1000000000) ? '∞' : (model.max_context / 1000).toFixed(0) + 'k'}</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Release</span>
                        <span class="metric-value">${model.release_date}</span>
                    </div>
                </div>
                <div class="card-footer" style="${model.is_too_big ? 'opacity: 0.5' : ''}">
                    <div class="price-main">
                        <span class="price-label">Monthly (${runs * instances}x total)</span>
                        <span class="price-value">${formatMoney(monthlyTotal)}</span>
                    </div>
                </div>
            `;
            return card;
        }

        function createSubCard(sub) {
            const isPinned = pinnedSubIds.has(sub.id);
            const card = document.createElement('div');
            card.className = 'model-card sub-card fade-in';
            card.style.borderColor = '#6366f1';
            card.innerHTML = `
                <div class="card-top">
                    <div class="model-info">
                        <span class="provider-label">${sub.provider}</span>
                        <h3>${sub.name}</h3>
                    </div>
                    <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${sub.id}', 'sub')">
                        <svg width="18" height="18" fill="${isPinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                    </button>
                </div>
                <div class="card-metrics" style="grid-template-columns: 1fr;">
                    <div class="metric-item">
                        <span class="metric-label">Included Models</span>
                        <span class="metric-value" style="font-size: 0.8rem;">${sub.included_models.join(', ')}</span>
                    </div>
                </div>
                <div class="card-footer" style="background: var(--primary-light); margin: 0.75rem -1rem -1rem -1rem; padding: 0.75rem 1rem;">
                    <div class="price-main">
                        <span class="price-label">Fixed Subscription</span>
                        <span class="price-value">${formatMoney(sub.monthly_price)}</span>
                    </div>
                </div>
            `;
            return card;
        }

        function renderCards() {
            const container = document.getElementById('resultsContainer');
            const pinnedContainer = document.getElementById('pinnedContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            
            container.innerHTML = ''; 
            pinnedContainer.innerHTML = '';

            let displayModels = currentEstimations.filter(m => selectedModelNames.has(m.model_name));
            
            // Filter by Modality: model must have at least one of the selected modalities
            displayModels = displayModels.filter(m => {
                return m.input_modalities.some(mod => selectedModalities.has(mod));
            });

            displayModels = displayModels.filter(m => `${m.model_name} ${m.provider}`.toLowerCase().includes(search));

            if (sort === 'newest') displayModels.sort((a, b) => b.release_date.localeCompare(a.release_date));
            else displayModels.sort((a, b) => a.total_cost - b.total_cost);

            const pinned = displayModels.filter(m => pinnedModelIds.has(m.model_name));
            const pinnedSubs = subscriptions.filter(s => pinnedSubIds.has(s.id));

            document.getElementById('pinnedSection').style.display = (pinned.length || pinnedSubs.length) ? 'block' : 'none';
            document.getElementById('pinnedCount').innerText = pinned.length + pinnedSubs.length;

            pinned.forEach(m => pinnedContainer.appendChild(createModelCard(m)));
            pinnedSubs.forEach(s => pinnedContainer.appendChild(createSubCard(s)));

            document.getElementById('totalCount').innerText = displayModels.length;
            displayModels.forEach(m => container.appendChild(createModelCard(m)));
        }

        function renderSubscriptions() {
            const container = document.getElementById('subsContainer');
            if (!subscriptions.length) return;
            document.getElementById('subsSection').style.display = 'block';
            container.innerHTML = '';

            subscriptions.forEach(sub => {
                container.appendChild(createSubCard(sub));
            });
        }

        function renderChart() {
            const canvas = document.getElementById('costChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const runs = [1, 100, 250, 500, 1000, 1500, 2000, 3000, 5000];
            const instances = parseInt(document.getElementById('instanceMultiplier').value) || 1;
            
            let modelsToChart = currentEstimations.filter(m => pinnedModelIds.has(m.model_name));
            let subsToChart = subscriptions.filter(s => pinnedSubIds.has(s.id));

            if (modelsToChart.length === 0 && subsToChart.length === 0) {
                modelsToChart = currentEstimations.slice(0, 5);
            }

            const datasets = modelsToChart.map((m, i) => ({
                label: m.model_name,
                data: runs.map(r => m.total_cost * r * instances),
                borderColor: `hsl(${i * 60}, 70%, 50%)`,
                backgroundColor: `hsl(${i * 60}, 70%, 50%, 0.1)`,
                borderWidth: 3,
                tension: 0.3,
                fill: false
            }));

            subsToChart.forEach((sub, i) => {
                datasets.push({
                    label: `Sub: ${sub.name}`,
                    data: runs.map(() => sub.monthly_price * instances),
                    borderColor: '#1e293b',
                    borderDash: [8, 4],
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                });
            });

            if (costChart) costChart.destroy();
            costChart = new Chart(ctx, {
                type: 'line',
                data: { labels: runs.map(r => `${r}x`), datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } },
                        tooltip: { padding: 12, backgroundColor: 'rgba(30, 41, 59, 0.9)' }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' }, title: { display: true, text: 'Monthly Cost (USD)', color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function exportToCSV() {
            const runs = parseInt(document.getElementById('monthlyRuns').value) || 1;
            const instances = parseInt(document.getElementById('instanceMultiplier').value) || 1;
            const headers = ["Provider", "Model", "Per Run", "Monthly", "Context", "Latency"];
            const rows = currentEstimations.filter(m => selectedModelNames.has(m.model_name)).map(m => [
                m.provider, m.model_name, m.total_cost, (m.total_cost * runs * instances), m.max_context, m.estimated_latency_sec
            ]);
            const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `token-costs-${runs * instances}x.csv`;
            a.click();
        }

        function showLoading(active) {
            document.getElementById('loadingOverlay').classList.toggle('active', active);
        }

        let debounce;
        document.querySelectorAll('input[type="number"]').forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(debounce);
                debounce = setTimeout(fetchEstimates, 400);
            });
        });
        document.getElementById('instanceMultiplier').addEventListener('input', renderAll);
        document.getElementById('searchInput').addEventListener('input', renderCards);
        document.getElementById('sortSelect').addEventListener('change', renderCards);

        fetchInitial();
    </script>
</body>
</html>
