<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Run Estimator | Token Cost Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #eef2ff;
            --success: #10b981;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-top: 1rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.04em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Input Panel */
        .token-panel {
            background: var(--card);
            padding: 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .input-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s;
            background: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        /* Monthly Runs Specialized Group */
        .monthly-group {
            grid-column: span 1;
            background: var(--bg);
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px dashed var(--border);
        }

        .runs-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        /* Buttons & Utilities */
        .utility-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .btn-group { display: flex; gap: 0.75rem; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.8rem 1.4rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { 
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgb(99 102 241 / 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--text-main);
            border-color: var(--border);
        }
        .btn-outline:hover {
            background: var(--bg);
            border-color: var(--text-muted);
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        /* Panels */
        .content-panel {
            background: var(--card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 2.5rem;
            overflow: hidden;
            display: none;
        }
        .content-panel.active { display: block; }

        .chart-container {
            padding: 2rem;
            height: 500px;
            width: 100%;
        }

        .selection-panel {
            padding: 2rem;
            background: #fff;
        }

        /* Results Grid */
        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .badge-count {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .model-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .model-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .model-info h3 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .provider-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
        }

        .pin-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pin-btn:hover, .pin-btn.pinned {
            background: var(--primary-light);
            color: var(--primary-dark);
            border-color: var(--primary);
        }

        .card-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
        }

        .metric-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-footer {
            margin-top: auto;
            padding-top: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price-main {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .price-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary-dark);
        }

        .too-big-warning {
            background: #fff1f2;
            color: #e11d48;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }

        /* Chips */
        .provider-group h4 {
            margin: 1.5rem 0 0.75rem 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chip-container { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        
        .chip {
            padding: 0.4rem 0.9rem;
            border-radius: 99px;
            background: var(--bg);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .chip.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }
        .loading-overlay.active { visibility: visible; opacity: 1; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--primary-light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .fade-in { animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1) forwards; }

    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header>
            <h1>AI Run Estimator</h1>
            <p class="subtitle">Compare token costs and latency across 100+ LLM configurations</p>
        </header>

        <section class="token-panel">
            <div class="input-group">
                <label for="inputTokens">Fresh Input</label>
                <input type="number" id="inputTokens" value="100000" min="0">
            </div>
            <div class="input-group">
                <label for="cachedTokens">Cache Read (Hits)</label>
                <input type="number" id="cachedTokens" value="0" min="0">
            </div>
            <div class="input-group">
                <label for="cacheWriteTokens">Cache Write (Create)</label>
                <input type="number" id="cacheWriteTokens" value="0" min="0">
            </div>
            <div class="input-group">
                <label for="outputTokens">Output Tokens</label>
                <input type="number" id="outputTokens" value="5000" min="0">
            </div>
            <div class="input-group monthly-group">
                <label for="monthlyRuns">Monthly Runs</label>
                <input type="number" id="monthlyRuns" value="500" min="1">
                <div class="runs-actions">
                    <button class="chip" onclick="setRuns(1)">1x</button>
                    <button class="chip" onclick="setRuns(100)">100x</button>
                    <button class="chip" onclick="setRuns(1000)">1k</button>
                </div>
            </div>
        </section>

        <div class="utility-bar">
            <div class="btn-group">
                <button class="btn btn-outline" onclick="togglePanel('selectionPanel')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Filter Models
                </button>
                <button class="btn btn-primary" onclick="togglePanel('chartPanel')">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                    Toggle Analysis Chart
                </button>
            </div>
            <div class="btn-group" style="flex: 1; justify-content: flex-end;">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search models or providers...">
                </div>
                <select id="sortSelect" style="max-width: 180px;">
                    <option value="price">Cheapest First</option>
                    <option value="newest">Latest Models</option>
                </select>
                <button class="btn btn-outline" onclick="exportToCSV()">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
            </div>
        </div>

        <div id="selectionPanel" class="content-panel">
            <div class="selection-panel" id="selectionInner"></div>
        </div>

        <div id="chartPanel" class="content-panel">
            <div class="chart-container">
                <canvas id="costChart"></canvas>
            </div>
        </div>

        <div id="pinnedSection" style="display: none;">
            <div class="section-header">
                <h2>Pinned Comparisons</h2>
                <span class="badge-count" id="pinnedCount">0</span>
            </div>
            <div class="results-grid" id="pinnedContainer"></div>
        </div>

        <div id="subsSection" style="display: none;">
            <div class="section-header">
                <h2>Fixed-Price Subscriptions</h2>
            </div>
            <div class="results-grid" id="subsContainer"></div>
        </div>

        <div class="section-header">
            <h2>Pay-as-you-go Models</h2>
            <span class="badge-count" id="totalCount">0</span>
        </div>
        <div class="results-grid" id="resultsContainer"></div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/estimate";
        const SUBS_URL = "http://localhost:8000/subscriptions";
        let currentEstimations = []; 
        let subscriptions = [];
        let selectedModelNames = new Set(); 
        let pinnedModelIds = new Set();
        let isFirstLoad = true;
        let costChart = null;

        const formatMoney = (amount) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 4 }).format(amount);
        };

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isActive = panel.classList.contains('active');
            
            // Close other panels
            document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
            
            if (!isActive) {
                panel.classList.add('active');
                if (id === 'chartPanel') renderChart();
            }
        }

        function setRuns(val) {
            document.getElementById('monthlyRuns').value = val;
            renderAll();
        }

        function togglePin(modelName) {
            if (pinnedModelIds.has(modelName)) pinnedModelIds.delete(modelName);
            else pinnedModelIds.add(modelName);
            renderAll();
        }

        async function fetchInitial() {
            showLoading(true);
            try {
                const subRes = await fetch(SUBS_URL);
                subscriptions = await subRes.json();
                await fetchEstimates();
            } catch (e) { console.error(e); }
            finally { showLoading(false); }
        }

        async function fetchEstimates() {
            const payload = {
                input_tokens: parseInt(document.getElementById('inputTokens').value) || 0,
                cached_tokens: parseInt(document.getElementById('cachedTokens').value) || 0,
                cache_write_tokens: parseInt(document.getElementById('cacheWriteTokens').value) || 0,
                output_tokens: parseInt(document.getElementById('outputTokens').value) || 0
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                currentEstimations = data.estimations; 
                
                if (isFirstLoad) {
                    currentEstimations.forEach(m => selectedModelNames.add(m.model_name));
                    isFirstLoad = false;
                }
                
                buildSelectionPanel();
                renderAll();
            } catch (error) { console.error(error); }
        }

        function renderAll() {
            renderCards();
            renderSubscriptions();
            if (document.getElementById('chartPanel').classList.contains('active')) renderChart();
        }

        function buildSelectionPanel() {
            const inner = document.getElementById('selectionInner');
            inner.innerHTML = '<h3>Model Visibility</h3>'; 
            const grouped = {};
            currentEstimations.forEach(m => {
                if (!grouped[m.provider]) grouped[m.provider] = [];
                grouped[m.provider].push(m.model_name);
            });

            for (const provider in grouped) {
                const div = document.createElement('div');
                div.className = 'provider-group';
                div.innerHTML = `<h4>${provider}</h4>`;
                const chips = document.createElement('div');
                chips.className = 'chip-container';
                grouped[provider].forEach(name => {
                    const chip = document.createElement('button');
                    chip.className = `chip ${selectedModelNames.has(name) ? 'selected' : ''}`;
                    chip.innerText = name;
                    chip.onclick = () => {
                        if (selectedModelNames.has(name)) selectedModelNames.delete(name);
                        else selectedModelNames.add(name);
                        buildSelectionPanel();
                        renderAll();
                    };
                    chips.appendChild(chip);
                });
                div.appendChild(chips);
                inner.appendChild(div);
            }
        }

        function createModelCard(model) {
            const runs = parseInt(document.getElementById('monthlyRuns').value) || 1;
            const monthlyTotal = model.total_cost * runs;
            const isPinned = pinnedModelIds.has(model.model_name);

            const card = document.createElement('div');
            card.className = 'model-card fade-in';
            
            card.innerHTML = `
                ${model.is_too_big ? '<div class="too-big-warning"><svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg> Exceeds Context Limit</div>' : ''}
                <div class="card-top">
                    <div class="model-info">
                        <span class="provider-label">${model.provider}</span>
                        <h3>${model.model_name}</h3>
                    </div>
                    <button class="pin-btn ${isPinned ? 'pinned' : ''}" onclick="togglePin('${model.model_name}')">
                        <svg width="18" height="18" fill="${isPinned ? 'currentColor' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                    </button>
                </div>
                <div class="card-metrics">
                    <div class="metric-item">
                        <span class="metric-label">Per Run</span>
                        <span class="metric-value">${formatMoney(model.total_cost)}</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Latency</span>
                        <span class="metric-value">~${model.estimated_latency_sec}s</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Max Context</span>
                        <span class="metric-value">${(model.max_context / 1000).toFixed(0)}k</span>
                    </div>
                    <div class="metric-item">
                        <span class="metric-label">Release</span>
                        <span class="metric-value">${model.release_date}</span>
                    </div>
                </div>
                <div class="card-footer" style="${model.is_too_big ? 'opacity: 0.5' : ''}">
                    <div class="price-main">
                        <span class="price-label">Monthly (${runs}x)</span>
                        <span class="price-value">${formatMoney(monthlyTotal)}</span>
                    </div>
                </div>
            `;
            return card;
        }

        function renderCards() {
            const container = document.getElementById('resultsContainer');
            const pinnedContainer = document.getElementById('pinnedContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            
            container.innerHTML = ''; 
            pinnedContainer.innerHTML = '';

            let displayModels = currentEstimations.filter(m => selectedModelNames.has(m.model_name));
            displayModels = displayModels.filter(m => `${m.model_name} ${m.provider}`.toLowerCase().includes(search));

            if (sort === 'newest') displayModels.sort((a, b) => b.release_date.localeCompare(a.release_date));
            else displayModels.sort((a, b) => a.total_cost - b.total_cost);

            const pinned = displayModels.filter(m => pinnedModelIds.has(m.model_name));
            document.getElementById('pinnedSection').style.display = pinned.length ? 'block' : 'none';
            document.getElementById('pinnedCount').innerText = pinned.length;
            pinned.forEach(m => pinnedContainer.appendChild(createModelCard(m)));

            document.getElementById('totalCount').innerText = displayModels.length;
            displayModels.forEach(m => container.appendChild(createModelCard(m)));
        }

        function renderSubscriptions() {
            const container = document.getElementById('subsContainer');
            if (!subscriptions.length) return;
            document.getElementById('subsSection').style.display = 'block';
            container.innerHTML = '';

            subscriptions.forEach(sub => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.style.borderColor = '#6366f1';
                card.innerHTML = `
                    <div class="card-top">
                        <div class="model-info">
                            <span class="provider-label">${sub.provider}</span>
                            <h3>${sub.name}</h3>
                        </div>
                    </div>
                    <div class="card-metrics" style="grid-template-columns: 1fr;">
                        <div class="metric-item">
                            <span class="metric-label">Included Models</span>
                            <span class="metric-value" style="font-size: 0.85rem;">${sub.included_models.join(', ')}</span>
                        </div>
                    </div>
                    <div class="card-footer" style="background: var(--primary-light); margin: 1.5rem -1.5rem -1.5rem -1.5rem; padding: 1.25rem 1.5rem;">
                        <div class="price-main">
                            <span class="price-label">Fixed Subscription</span>
                            <span class="price-value">${formatMoney(sub.monthly_price)}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderChart() {
            const canvas = document.getElementById('costChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const runs = [1, 100, 250, 500, 1000, 1500, 2000, 3000, 5000];
            
            let modelsToChart = currentEstimations.filter(m => pinnedModelIds.has(m.model_name));
            if (modelsToChart.length === 0) modelsToChart = currentEstimations.slice(0, 5);

            const datasets = modelsToChart.map((m, i) => ({
                label: m.model_name,
                data: runs.map(r => m.total_cost * r),
                borderColor: `hsl(${i * 60}, 70%, 50%)`,
                backgroundColor: `hsl(${i * 60}, 70%, 50%, 0.1)`,
                borderWidth: 3,
                tension: 0.3,
                fill: false
            }));

            subscriptions.forEach((sub, i) => {
                datasets.push({
                    label: `Sub: ${sub.name}`,
                    data: runs.map(() => sub.monthly_price),
                    borderColor: '#1e293b',
                    borderDash: [8, 4],
                    borderWidth: 2,
                    pointRadius: 0,
                    fill: false
                });
            });

            if (costChart) costChart.destroy();
            costChart = new Chart(ctx, {
                type: 'line',
                data: { labels: runs.map(r => `${r}x`), datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } },
                        tooltip: { padding: 12, backgroundColor: 'rgba(30, 41, 59, 0.9)' }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' }, title: { display: true, text: 'Monthly Cost (USD)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function exportToCSV() {
            const runs = parseInt(document.getElementById('monthlyRuns').value) || 1;
            const headers = ["Provider", "Model", "Per Run", "Monthly", "Context", "Latency"];
            const rows = currentEstimations.filter(m => selectedModelNames.has(m.model_name)).map(m => [
                m.provider, m.model_name, m.total_cost, (m.total_cost * runs), m.max_context, m.estimated_latency_sec
            ]);
            const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `token-costs-${runs}x.csv`;
            a.click();
        }

        function showLoading(active) {
            document.getElementById('loadingOverlay').classList.toggle('active', active);
        }

        let debounce;
        document.querySelectorAll('input[type="number"]').forEach(el => {
            el.addEventListener('input', () => {
                clearTimeout(debounce);
                debounce = setTimeout(fetchEstimates, 400);
            });
        });
        document.getElementById('searchInput').addEventListener('input', renderCards);
        document.getElementById('sortSelect').addEventListener('change', renderCards);

        fetchInitial();
    </script>
</body>
</html>
